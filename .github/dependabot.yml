version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    # Zgrupowanie aktualizacji zmniejsza szum w repozytorium (opcjonalne, ale bardzo wygodne)
    groups:
      python-deps:
        patterns:
          - "*"
