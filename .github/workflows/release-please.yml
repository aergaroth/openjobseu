name: Release Please

on:
  push:
    branches:
      - main

env:
  DB_MODE: standard
  DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/testdb
  APP_RUNTIME: local

permissions:
  contents: write
  pull-requests: write

jobs:
  pytest:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv pip install --system -r requirements.txt -r requirements-dev.txt
      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            sleep 1
          done
      - name: Initialize schema
        run: |
          alembic upgrade head
      - name: Run tests
        run: pytest -q

  release-please:
    needs: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}  
          release-type: python
          target-branch: main
          