name: Prod Flow

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: prod-flow-${{ github.ref }}
  cancel-in-progress: false

env:
  DB_MODE: standard
  DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/testdb
  APP_RUNTIME: local

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt -r requirements-dev.txt

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            sleep 1
          done

      - name: Initialize schema
        run: |
          alembic upgrade head

      - name: Run tests
        run: pytest -q

  release-please:
    needs: pytest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          release-type: python
          target-branch: main

  build-deploy-prod:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_version: ${{ steps.release-meta.outputs.release_version }}

    steps:
      - uses: actions/checkout@v4

      - id: release-meta
        name: Resolve release version
        env:
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
          WORKFLOW_SHA: ${{ github.sha }}
        run: |
          VERSION="${RELEASE_TAG:-$WORKFLOW_SHA}"
          echo "release_version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PROD }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker europe-north1-docker.pkg.dev

      - name: Build & push image (PROD)
        env:
          PROJECT_ID: openjobseu
          SHA: ${{ github.sha }}
          VERSION: ${{ steps.release-meta.outputs.release_version }}
        run: |
          IMAGE=europe-north1-docker.pkg.dev/$PROJECT_ID/$PROJECT_ID/$PROJECT_ID
          docker build -t $IMAGE:$SHA -t $IMAGE:$VERSION .
          docker push $IMAGE:$SHA
          docker push $IMAGE:$VERSION

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Apply (PROD)
        working-directory: infra/gcp/prod
        run: |
          IMAGE_REF="europe-north1-docker.pkg.dev/openjobseu/openjobseu/openjobseu:${{ steps.release-meta.outputs.release_version }}"
          terraform init -input=false
          terraform apply -auto-approve \
            -var="project_id=openjobseu" \
            -var="image=$IMAGE_REF" \
            -var="google_client_id=${{ secrets.PROD_GOOGLE_CLIENT_ID }}" \
            -var="google_client_secret=${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}" \
            -var="session_secret_key=${{ secrets.PROD_SESSION_SECRET_KEY }}" \
            -var="allowed_auth_email=${{ secrets.PROD_ALLOWED_AUTH_EMAIL }}" \
            -var="google_api_key=${{ secrets.PROD_GOOGLE_API_KEY }}" \
            -var="google_cse_id=${{ secrets.PROD_GOOGLE_CSE_ID }}"

  publish-frontend-assets:
    needs: build-deploy-prod
    if: needs.build-deploy-prod.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_PROD }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Publish frontend assets to GCS
        env:
          PUBLIC_FEED_BUCKET: ${{ secrets.PUBLIC_FEED_BUCKET_PROD }}
          RELEASE_VERSION: ${{ needs.build-deploy-prod.outputs.release_version }}
        run: |
          python scripts/publish_frontend_assets.py --release-version "$RELEASE_VERSION"
