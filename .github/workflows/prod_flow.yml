name: Prod Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: prod-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          release-type: simple
          target-branch: main

  build-deploy-prod:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      release_version: ${{ steps.release-meta.outputs.release_version }}

    steps:
      - uses: actions/checkout@v4

      - id: release-meta
        name: Resolve release version
        env:
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
          WORKFLOW_SHA: ${{ github.sha }}
        run: |
          VERSION="${RELEASE_TAG:-$WORKFLOW_SHA}"
          echo "release_version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER_PROD }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_PROD }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker europe-north1-docker.pkg.dev

      - name: Build & push image (PROD)
        env:
          PROJECT_ID: openjobseu
          SHA: ${{ github.sha }}
          VERSION: ${{ steps.release-meta.outputs.release_version }}
        run: |
          IMAGE=europe-north1-docker.pkg.dev/$PROJECT_ID/$PROJECT_ID/$PROJECT_ID
          docker build -t $IMAGE:$SHA -t $IMAGE:$VERSION .
          docker push $IMAGE:$SHA
          docker push $IMAGE:$VERSION

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Apply (PROD)
        working-directory: infra/gcp/prod
        run: |
          IMAGE_REF="europe-north1-docker.pkg.dev/openjobseu/openjobseu/openjobseu:${{ steps.release-meta.outputs.release_version }}"
          terraform init -input=false
          terraform apply -auto-approve \
            -var="project_id=openjobseu" \
            -var="image=$IMAGE_REF" \
            -var="google_client_id=${{ secrets.PROD_GOOGLE_CLIENT_ID }}" \
            -var="google_client_secret=${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}" \
            -var="session_secret_key=${{ secrets.PROD_SESSION_SECRET_KEY }}" \
            -var="allowed_auth_email=${{ secrets.PROD_ALLOWED_AUTH_EMAIL }}" \
            -var="google_api_key=${{ secrets.PROD_GOOGLE_API_KEY }}" \
            -var="google_cse_id=${{ secrets.PROD_GOOGLE_CSE_ID }}" \
            -var="serper_api_key=${{ secrets.PROD_SERPER_API_KEY }}"

  publish-frontend-assets:
    needs: build-deploy-prod
    if: needs.build-deploy-prod.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER_PROD }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_ASSETS_PROD }}

      - name: Publish frontend assets to GCS
        env:
          PUBLIC_FEED_BUCKET: ${{ vars.PUBLIC_FEED_BUCKET_PROD }}
          RELEASE_VERSION: ${{ needs.build-deploy-prod.outputs.release_version }}
        run: |
          python scripts/publish_frontend_assets.py --release-version "$RELEASE_VERSION"
