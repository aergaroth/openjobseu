name: Dev Deploy

on:
  push:
    branches: [develop]
    paths-ignore:
      - "README.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: dev-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy-dev:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/develop') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_DEV }}
          token_format: id_token
          token_audience: ${{ vars.DEV_APP_BASE_URL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker europe-north1-docker.pkg.dev

      - name: Build & push image (DEV)
        env:
          PROJECT_ID: dev-openjobseu
          SHA: ${{ github.sha }}
        run: |
          IMAGE=europe-north1-docker.pkg.dev/$PROJECT_ID/$PROJECT_ID/$PROJECT_ID
          docker build -t $IMAGE:$SHA .
          docker push $IMAGE:$SHA

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Apply (DEV)
        working-directory: infra/gcp/dev
        run: |
          terraform init -input=false
          terraform apply -auto-approve \
            -var="project_id=dev-openjobseu" \
            -var="image=europe-north1-docker.pkg.dev/dev-openjobseu/dev-openjobseu/dev-openjobseu:${{ github.sha }}" \
            -var="google_client_id=${{ secrets.DEV_GOOGLE_CLIENT_ID }}" \
            -var="google_client_secret=${{ secrets.DEV_GOOGLE_CLIENT_SECRET }}" \
            -var="session_secret_key=${{ secrets.DEV_SESSION_SECRET_KEY }}" \
            -var="allowed_auth_email=${{ secrets.DEV_ALLOWED_AUTH_EMAIL }}" \
            -var="google_api_key=${{ secrets.DEV_GOOGLE_API_KEY }}" \
            -var="google_cse_id=${{ secrets.DEV_GOOGLE_CSE_ID }}"

      - name: Setup Python for smoke test
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install smoke test dependencies
        run: pip install requests google-auth

      - name: Run post-deploy smoke test
        env:
          APP_BASE_URL: ${{ vars.DEV_APP_BASE_URL }}
          OIDC_TOKEN: ${{ steps.auth.outputs.id_token }}
        run: python scripts/post_deploy_smoke_check.py
