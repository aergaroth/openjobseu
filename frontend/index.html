<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenJobsEU — EU Remote Job Board</title>
  <meta name="description" content="Open-source, compliance-first aggregator of EU-wide remote job offers. Updated daily. No scraping noise." />
  <link rel="canonical" href="https://openjobseu.org/" />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://openjobseu.org/" />
  <meta property="og:title"       content="OpenJobsEU — EU Remote Job Board" />
  <meta property="og:description" content="Open-source aggregator of legally accessible EU remote jobs. Compliance-first, updated daily." />
  <meta property="og:image"       content="https://openjobseu.org/og.png" />
  <meta name="twitter:card"       content="summary_large_image" />
  <meta name="twitter:title"      content="OpenJobsEU — EU Remote Job Board" />
  <meta name="twitter:description" content="Open-source aggregator of legally accessible EU remote jobs." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar" aria-label="Site information and filters">
      <div class="sidebar-inner">

        <div class="brand">
          <a href="/" aria-label="OpenJobsEU home">
            <span class="brand-name">OpenJobsEU</span>
            <span class="brand-sub">EU Remote Jobs</span>
          </a>
        </div>

        <p class="brand-desc">
          Open-source aggregator of legally accessible remote jobs across the EU.
          Compliance-first. No scraping noise.
        </p>

        <a class="github-link" href="https://github.com/aergaroth/openjobseu" target="_blank" rel="noopener noreferrer" aria-label="View source on GitHub">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
            <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.745 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
          </svg>
          aergaroth/openjobseu
        </a>

        <!-- Filters -->
        <div class="filters-section">
          <div class="filter-block">
            <label class="filter-label" for="search">Search</label>
            <input
              class="search-input"
              id="search"
              type="search"
              placeholder="Title or company…"
              aria-label="Filter jobs by title or company"
              autocomplete="off"
            />
          </div>

          <div class="filter-block">
            <span class="filter-label" id="dept-label">Department</span>
            <div
              id="department-filters"
              class="department-filters"
              role="group"
              aria-labelledby="dept-label"
            ></div>
          </div>

          <div class="filter-block">
            <span class="filter-label" id="salary-label">Salary range (EUR/yr)</span>
            <div class="salary-row" role="group" aria-labelledby="salary-label">
              <label class="sr-only" for="salary-min">Minimum salary</label>
              <input type="number" id="salary-min" placeholder="Min" min="0" step="5000" aria-label="Minimum salary in EUR" />
              <span class="salary-sep" aria-hidden="true">—</span>
              <label class="sr-only" for="salary-max">Maximum salary</label>
              <input type="number" id="salary-max" placeholder="Max" min="0" step="5000" aria-label="Maximum salary in EUR" />
            </div>
            <label class="salary-include">
              <input type="checkbox" id="salary-include-unknown" checked />
              <span>Include jobs without salary info</span>
            </label>
          </div>

          <div class="filter-block filter-block--row">
            <div class="sort-wrap">
              <label class="filter-label" for="sort-select">Sort</label>
              <select id="sort-select" aria-label="Sort jobs">
                <option value="newest">Newest first</option>
                <option value="oldest">Oldest first</option>
                <option value="salary-desc">Salary ↓</option>
                <option value="salary-asc">Salary ↑</option>
              </select>
            </div>
            <button id="reset-filters" class="reset-btn" aria-label="Reset all filters">Reset</button>
          </div>
        </div>

        <!-- Meta info -->
        <div class="sidebar-meta" id="meta" aria-live="polite" aria-atomic="true">—</div>

        <div class="sidebar-footer">
          Early-stage. Stability over features.
        </div>

      </div>
    </aside>

    <!-- ── Main ── -->
    <main class="content" id="main-content">
      <div class="content-inner">

        <div class="content-header">
          <h1 class="content-title">Job feed</h1>
          <div
            id="results-count"
            class="results-count"
            role="status"
            aria-live="polite"
            aria-atomic="true"
          ></div>
        </div>

        <div id="jobs-list" class="jobs-list" aria-label="Job listings">
          <div class="placeholder-row" role="status">Loading jobs…</div>
        </div>

      </div>
    </main>

  </div>

  <!-- Structured data injected by feed.js -->
  <script id="structured-data" type="application/ld+json"></script>

  <script src="./feed.js" defer></script>
</body>
</html>
