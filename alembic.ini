# A generic, single database configuration.

[alembic]
# Path to migration scripts
script_location = storage/alembic

# Adds the project root to sys.path so we can import app modules
prepend_sys_path = .

# Use os path separator for prepend_sys_path to resolve the DeprecationWarning
path_separator = os

# Timezone to use when rendering the date within the migration file
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S